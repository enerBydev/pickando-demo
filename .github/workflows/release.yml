name: Release — Multi-Platform Builds

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build backend (Linux)
        run: cargo build --release -p pickando-backend

      - name: Package release
        run: |
          mkdir -p release
          cp target/release/pickando-backend release/pickando-backend-linux-x86_64
          chmod +x release/pickando-backend-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: pickando-linux-x86_64
          path: release/pickando-backend-linux-x86_64

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build backend (Windows)
        run: cargo build --release -p pickando-backend

      - uses: actions/upload-artifact@v4
        with:
          name: pickando-windows-x86_64
          path: target/release/pickando-backend.exe

  build-web:
    name: Build Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Build frontend WASM
        run: cargo build --release --target wasm32-unknown-unknown -p pickando-frontend

      - name: Install wasm-bindgen-cli
        run: |
          WASM_BINDGEN_VER=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "Installing wasm-bindgen-cli v${WASM_BINDGEN_VER}"
          cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VER}"

      - name: Process WASM with bindgen and package
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release/deps -name "pickando_frontend*.wasm" ! -name "*_*" | head -1)
          if [ -z "$WASM_FILE" ]; then
            WASM_FILE=$(find target/wasm32-unknown-unknown/release/deps -name "pickando_frontend-*.wasm" | head -1)
          fi
          mkdir -p crates/frontend/dist/assets
          wasm-bindgen --target web --out-dir crates/frontend/dist/assets --out-name pickando "$WASM_FILE"
          cp crates/frontend/assets/main.css crates/frontend/dist/assets/
          cat > crates/frontend/dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Pickando — Same-Direction Local Mobility</title>
              <link rel="stylesheet" href="/assets/main.css" />
              <style>
                  .wasm-loading{display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;color:#e0e0e0;font-family:system-ui,sans-serif}
                  .wasm-loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top:3px solid #4ecdc4;border-radius:50%;animation:spin 1s linear infinite;margin-right:16px}
                  @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
              </style>
          </head>
          <body>
              <div id="main" class="wasm-loading"><div class="wasm-loading-spinner"></div><span>Cargando Pickando...</span></div>
              <script type="module">
                  import init from '/assets/pickando.js';
                  init('/assets/pickando_bg.wasm').catch(e=>{console.error(e);document.getElementById('main').innerHTML='<div style="text-align:center;padding:2rem"><h2 style="color:#ff6b6b">Error</h2><p style="color:#aaa">'+(e.message||'Unknown error')+'</p></div>'});
              </script>
          </body>
          </html>
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: pickando-web
          path: crates/frontend/dist/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    continue-on-error: true  # Android build requires extra NDK/setup
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android

      - name: Install cargo-mobile2
        run: cargo install cargo-mobile2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android
        run: echo "Android build requires NDK and cargo-mobile2 configuration — placeholder for M2"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pickando-android
          path: target/android/**/*.apk
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Pickando Demo ${{ github.ref_name }}
          body: |
            ## Pickando Demo — Same-Direction Local Mobility

            **Stack:** Rust 1.96 + Dioxus 0.7 + Axum 0.8

            ### Downloads
            - **Linux**: `pickando-linux-x86_64` — Binary for x86_64 Linux
            - **Windows**: `pickando-windows-x86_64` — Binary for x86_64 Windows
            - **Web**: `pickando-web` — Static WASM files for web deployment
            - **Android**: `pickando-android` — APK file (if available)

            ### Quick Start
            ```bash
            # Backend
            ./pickando-backend
            # API at http://localhost:3000

            # Web frontend
            # Serve the web/ folder with any HTTP server
            ```

            ### Endpoints
            | Method | Path | Description |
            |--------|------|-------------|
            | GET | /api/v1/health | Health check |
            | GET | /api/v1/routes | List sample routes |
            | POST | /api/v1/routes | Create route (placeholder) |
            | POST | /api/v1/match | Find matching routes |
            | GET | /ws | WebSocket echo server |
          draft: false
          prerelease: false
