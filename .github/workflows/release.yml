name: Release — Build & Deploy

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-backend:
    name: Backend (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build backend
        run: cargo build --release -p pickando-backend

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pickando-backend-linux
          path: target/release/pickando-backend

  build-wasm:
    name: Frontend (WASM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: |
          VER=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          cargo install wasm-bindgen-cli --version "$VER"

      - name: Build frontend WASM
        run: cargo build --release --target wasm32-unknown-unknown -p pickando-frontend

      - name: Generate WASM bindings
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release/deps -name "pickando_frontend*.wasm" ! -name "*_*" | head -1)
          [ -z "$WASM_FILE" ] && WASM_FILE=$(find target/wasm32-unknown-unknown/release/deps -name "pickando_frontend-*.wasm" | head -1)
          mkdir -p dist/assets
          wasm-bindgen --target web --out-dir dist/assets --out-name pickando "$WASM_FILE"
          cp crates/frontend/assets/main.css dist/assets/

      - name: Create index.html
        run: |
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <meta name="description" content="Pickando — Same-direction local mobility" />
              <title>Pickando — Same-Direction Local Mobility</title>
              <link rel="stylesheet" href="/assets/main.css" />
              <style>
                  .wasm-loading {
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      height: 100vh;
                      background: #0D0D11;
                      color: #e0e0e0;
                      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
                  }
                  .wasm-loading-spinner {
                      width: 40px;
                      height: 40px;
                      border: 3px solid rgba(255,255,255,0.1);
                      border-top: 3px solid #00FF88;
                      border-radius: 50%;
                      animation: spin 1s linear infinite;
                      margin-right: 16px;
                  }
                  @keyframes spin {
                      0% { transform: rotate(0deg); }
                      100% { transform: rotate(360deg); }
                  }
              </style>
          </head>
          <body>
              <div id="main" class="wasm-loading">
                  <div class="wasm-loading-spinner"></div>
                  <span>Cargando Pickando...</span>
              </div>
              <script type="module">
                  import init from '/assets/pickando.js';
                  init('/assets/pickando_bg.wasm').catch(e => {
                      console.error('Failed to initialize Pickando:', e);
                      document.getElementById('main').innerHTML = '<div style="text-align:center;padding:2rem;"><h2 style="color:#FF4466;">Error al cargar</h2><p style="color:#aaa;">' + (e.message || 'Unknown error') + '</p><button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1rem;background:#00FF88;border:none;border-radius:6px;cursor:pointer;color:#000;">Reintentar</button></div>';
                  });
              </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pickando-frontend-wasm
          path: dist/

  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Android native libraries
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 build --release -p pickando-frontend --features mobile
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.9

      - name: Initialize Android project
        working-directory: crates/frontend
        run: dx android init

      - name: Build Android APK
        working-directory: crates/frontend
        run: dx android build --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pickando-android-apk
          path: crates/frontend/target/android/app/release/app-release.apk

  create-release:
    name: Create GitHub Release
    needs: [build-backend, build-wasm, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/pickando-backend-linux/pickando-backend
            artifacts/pickando-android-apk/app-release.apk
            artifacts/pickando-frontend-wasm/*
          body: |
            ## Pickando Demo Release

            ### Artifacts
            - **pickando-backend-linux** — Linux x86_64 binary
            - **app-release.apk** — Android APK (signed with debug key)
            - **pickando-frontend-wasm/** — Web WASM frontend files

            ### Installation
            - **Android**: Download `app-release.apk`, enable "Install from unknown sources", install
            - **Web**: Serve the `pickando-frontend-wasm/` directory with any static file server
            - **Backend**: Run `./pickando-backend` with `PORT` and `STATIC_DIR` env vars
          draft: false
          prerelease: false
