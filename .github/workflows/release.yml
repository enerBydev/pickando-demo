name: Release — Build & Deploy

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-backend:
    name: Backend (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build backend
        run: cargo build --release -p pickando-backend

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pickando-backend-linux
          path: target/release/pickando-backend

  build-wasm:
    name: Frontend (WASM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: |
          VER=$(grep -A1 'name = "wasm-bindgen"' Cargo.lock | grep version | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          cargo install wasm-bindgen-cli --version "$VER"

      - name: Build frontend WASM
        run: cargo build --release --target wasm32-unknown-unknown -p pickando-frontend

      - name: Generate WASM bindings
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release/deps -name "pickando_frontend*.wasm" ! -name "*_*" | head -1)
          [ -z "$WASM_FILE" ] && WASM_FILE=$(find target/wasm32-unknown-unknown/release/deps -name "pickando_frontend-*.wasm" | head -1)
          mkdir -p dist/assets
          wasm-bindgen --target web --out-dir dist/assets --out-name pickando "$WASM_FILE"
          cp crates/frontend/assets/main.css dist/assets/

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pickando-frontend-wasm
          path: dist/
