name: Release — Multi-Platform Builds + Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'
      allow_ephemeral_keystore:
        description: 'Allow CI-only keystore (NOT recommended — APK will not upgrade-install). Set to true only for testing.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Least-privilege permissions for the default GITHUB_TOKEN.
# Release workflow needs `contents: write` to create GitHub Releases
# and upload assets. All other scopes default to none.
permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # Build backend binaries for Linux + Windows
  # ============================================================
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-linux-

      - name: Build backend
        run: cargo build --release -p pickando-backend

      - name: Package release
        run: |
          mkdir -p release
          cp target/release/pickando-backend release/pickando-backend-linux-x86_64
          chmod +x release/pickando-backend-linux-x86_64
          cd release && tar czf ../pickando-linux-x86_64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: pickando-linux-x86_64
          path: release/

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-windows-

      - name: Build backend
        run: cargo build --release -p pickando-backend

      - name: Package release
        shell: pwsh
        run: |
          mkdir release -Force
          copy target/release/pickando-backend.exe release/pickando-backend-windows-x86_64.exe
          Compress-Archive -Path release/* -DestinationPath pickando-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: pickando-windows-x86_64
          path: release/

  # ============================================================
  # Build Web (WASM) bundle
  # ============================================================
  build-web:
    name: Build Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-wasm-

      - name: Cache dioxus-cli binary
        uses: actions/cache@v4
        id: dioxus-cache
        with:
          path: ~/.cargo/bin/dx
          key: dioxus-cli-0.7.9-${{ runner.os }}

      - name: Install dioxus-cli (cached)
        if: steps.dioxus-cache.outputs.cache-hit != 'true'
        run: cargo install dioxus-cli --version 0.7.9 --locked

      - name: Build frontend (web)
        run: cd crates/frontend && dx build --platform web --release

      - name: Copy assets to build output
        run: |
          DIST_DIR="target/dx/pickando-frontend/release/web/public"
          mkdir -p "$DIST_DIR/assets"
          # Dioxus 0.7 does NOT copy these assets to the build output even
          # though index.html references them. We must copy all 8 manually
          # (kept in sync with Dockerfile lines 81-97).
          cp crates/frontend/assets/main.css "$DIST_DIR/assets/main.css"
          cp crates/frontend/assets/favicon.svg "$DIST_DIR/assets/favicon.svg"
          cp crates/frontend/assets/watchdog.js "$DIST_DIR/assets/watchdog.js"
          cp crates/frontend/assets/favicon-16.png "$DIST_DIR/assets/favicon-16.png"
          cp crates/frontend/assets/favicon-32.png "$DIST_DIR/assets/favicon-32.png"
          cp crates/frontend/assets/apple-touch-icon.png "$DIST_DIR/assets/apple-touch-icon.png"
          cp crates/frontend/assets/og-image.png "$DIST_DIR/assets/og-image.png"
          cp crates/frontend/assets/site.webmanifest "$DIST_DIR/assets/site.webmanifest"
          # Verify all 8 assets present (fail loudly if any missing)
          test -f "$DIST_DIR/index.html"
          test -f "$DIST_DIR/assets/main.css"
          test -f "$DIST_DIR/assets/favicon.svg"
          test -f "$DIST_DIR/assets/watchdog.js"
          test -f "$DIST_DIR/assets/favicon-16.png"
          test -f "$DIST_DIR/assets/favicon-32.png"
          test -f "$DIST_DIR/assets/apple-touch-icon.png"
          test -f "$DIST_DIR/assets/og-image.png"
          test -f "$DIST_DIR/assets/site.webmanifest"
          test -n "$(find "$DIST_DIR" -name '*.wasm')"
          echo "=== Build output ==="
          ls -la "$DIST_DIR"
          ls -la "$DIST_DIR/assets"

      - uses: actions/upload-artifact@v4
        with:
          name: pickando-web
          path: target/dx/pickando-frontend/release/web/public/

  # ============================================================
  # Build Android APK — WebView wrapper (release-signed)
  # ============================================================
  # Strategy: build a WebView wrapper APK that loads the live deployed site.
  # Reliable in CI (just Gradle + standard Android SDK, no NDK required),
  # small APK, fast to build, always works because it just wraps the web app.
  # ============================================================
  build-android:
    name: Build Android APK (WebView wrapper, release-signed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          # setup-android@v3 doesn't accept sdk-platform / sdk-build-tools inputs;
          # install them explicitly via sdkmanager.
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true
          test -d "$ANDROID_SDK_ROOT/platforms/android-34"
          test -f "$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt"
          test -f "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner"
          test -f "$ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign"

      - name: Compute version from tag
        id: ver
        run: |
          # Derive versionName + versionCode from the triggering tag.
          # Tag format: v0.5.4 → versionName=0.5.4, versionCode=50400
          # (major * 10000 + minor * 100 + patch)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          # Strip leading 'v'
          V="${TAG#v}"
          # Parse semver
          MAJOR=$(echo "$V" | cut -d. -f1)
          MINOR=$(echo "$V" | cut -d. -f2)
          PATCH=$(echo "$V" | cut -d. -f3 | cut -d- -f1)
          # Default missing components to 0
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          VCODE=$((${MAJOR}*10000 + ${MINOR}*100 + ${PATCH}))
          echo "versionName=${V}" >> $GITHUB_OUTPUT
          echo "versionCode=${VCODE}" >> $GITHUB_OUTPUT
          echo "Computed: tag=${TAG} versionName=${V} versionCode=${VCODE}"

      - name: Verify Android project structure
        run: |
          echo "=== Android project structure ==="
          find android -type f -not -path '*/build/*' -not -path '*/.gradle/*' | sort
          echo "=== Verify required files exist ==="
          test -f android/app/src/main/AndroidManifest.xml
          test -f android/app/src/main/java/com/pickando/demo/MainActivity.java
          test -f android/app/src/main/res/values/strings.xml
          test -f android/app/src/main/res/values/styles.xml
          test -f android/app/src/main/res/xml/network_security_config.xml
          test -f android/app/src/main/res/xml/backup_rules.xml
          test -f android/app/src/main/res/xml/data_extraction_rules.xml
          test -f android/app/src/main/res/drawable/ic_launcher_foreground.xml
          test -f android/app/src/main/res/drawable/ic_launcher_background.xml
          test -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          test -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          test -f android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          test -f android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          test -f android/app/src/main/assets/offline.html
          test -f android/app/build.gradle
          test -f android/build.gradle
          test -f android/settings.gradle
          test -f android/gradle.properties
          test -f android/gradle/wrapper/gradle-wrapper.properties
          test -f android/gradle/wrapper/gradle-wrapper.jar
          test -f android/gradlew
          test -x android/gradlew
          echo "[OK] All Android project files present"

      - name: Build release APK with versionCode from tag
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          chmod +x gradlew
          # Pass versionCode + versionName via -P properties
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -PversionCode=${{ steps.ver.outputs.versionCode }} \
            -PversionName=${{ steps.ver.outputs.versionName }}

      - name: Find and rename APK
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f -not -path '*/node_modules/*' 2>/dev/null
          # Prefer release-unsigned, then release, then any
          APK_PATH=$(find . -name "*-release-unsigned.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*-release.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK file found after build"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" pickando-demo.apk
          ls -la pickando-demo.apk
          unzip -l pickando-demo.apk | head -20

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is NOT set. Each release will be signed with a DIFFERENT cert, causing INSTALL_FAILED_UPDATE_INCOMPATIBLE on user upgrades. See docs/APK_SIGNING.md for setup instructions. To proceed anyway (NOT recommended for production releases), set ALLOW_EPHEMERAL_KEYSTORE=1 in the workflow run."
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.allow_ephemeral_keystore }}" = "true" ]; then
              echo "::warning::ALLOW_EPHEMERAL_KEYSTONE=true — generating CI-only keystore. APK will NOT upgrade-install over previous versions."
              keytool -genkeypair -v \
                -keystore $HOME/ci-release.keystore \
                -alias ci-release \
                -keyalg RSA -keysize 4096 \
                -validity 10000 \
                -storepass changeit \
                -keypass changeit \
                -dname "CN=Pickando Demo, OU=Engineering, O=enerBydev, L=BuenosAires, ST=BuenosAires, C=AR"
              echo "KEYSTORE_PATH=$HOME/ci-release.keystore" >> $GITHUB_ENV
              echo "KEYSTORE_PASS=changeit" >> $GITHUB_ENV
              echo "KEY_ALIAS=ci-release" >> $GITHUB_ENV
              echo "KEY_PASS=changeit" >> $GITHUB_ENV
            else
              exit 1
            fi
          else
            echo "[OK] Using persistent release keystore from ANDROID_KEYSTORE_BASE64 secret."
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > $HOME/release.keystore
            # Verify keystore is readable with provided password
            keytool -list -keystore $HOME/release.keystore -storepass "$ANDROID_KEYSTORE_PASSWORD" > /dev/null 2>&1 || {
              echo "::error::Keystore password is wrong OR keystore is corrupt. Verify ANDROID_KEYSTORE_PASSWORD secret."
              exit 1
            }
            echo "KEYSTORE_PATH=$HOME/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASS=$ANDROID_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "KEY_ALIAS=$ANDROID_KEY_ALIAS" >> $GITHUB_ENV
            echo "KEY_PASS=$ANDROID_KEY_PASSWORD" >> $GITHUB_ENV
            # Print cert SHA256 for traceability (matches what users see when verifying)
            echo "=== Persistent keystore cert fingerprint ==="
            keytool -list -v -keystore $HOME/release.keystore -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>&1 | grep -E "SHA256|Owner|Alias"
          fi

      - name: Zipalign + sign APK with release keystore
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          # Zipalign with 4-byte boundary (required for APK Signature Scheme v2+)
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v -p 4 pickando-demo.apk pickando-demo-aligned.apk
          # Sign with apksigner using v1+v2+v3 schemes (v1 explicit even though default-on)
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks "$KEYSTORE_PATH" \
            --ks-pass pass:"$KEYSTORE_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass pass:"$KEY_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out pickando-demo-signed.apk \
            pickando-demo-aligned.apk
          # Final name
          mv pickando-demo-signed.apk pickando-demo.apk
          ls -la pickando-demo.apk

      - name: Print final APK signing cert (for cross-release verification)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          echo "=== Final APK signing certificate ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs pickando-demo.apk | grep -E "SHA-256|Signer|certificate DN"
          echo
          echo "=== Compare this SHA-256 with previous releases to verify keystore persistence ==="
          echo "If the SHA-256 changes between releases, users will see INSTALL_FAILED_UPDATE_INCOMPATIBLE."

      - name: Verify APK signing (NO debug cert, NOT debuggable)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -e
          echo "=== Signing verification ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs pickando-demo.apk | tee certs.txt
          if grep -q "CN=Android Debug" certs.txt; then
            echo "::error::APK is signed with Android Debug certificate — this will fail to install on real Android 14+ devices. See docs/APK_SIGNING.md"
            exit 1
          fi
          echo "[OK] APK is signed with a non-debug certificate"

          echo "=== Manifest verification (NOT debuggable, NOT cleartext) ==="
          $ANDROID_HOME/build-tools/34.0.0/aapt dump xmltree pickando-demo.apk AndroidManifest.xml > manifest.txt
          if grep -q "android:debuggable(0x0101000f)=(type 0x12)0xffffffff" manifest.txt; then
            echo "::error::APK manifest has android:debuggable=true — this is FORBIDDEN in release builds"
            exit 1
          fi
          echo "[OK] Manifest is NOT debuggable"

          echo "=== Icon verification (PNG fallbacks at all densities) ==="
          $ANDROID_HOME/build-tools/34.0.0/aapt dump resources pickando-demo.apk > resources.txt
          ICON_COUNT=$(grep -c "mipmap/ic_launcher:" resources.txt || true)
          if [ "$ICON_COUNT" -lt 6 ]; then
            echo "::error::Only $ICON_COUNT mipmap/ic_launcher entries found — need at least 6 (anydpi-v26 + 5 PNG densities). Pre-Android 8.0 devices need PNG fallbacks."
            exit 1
          fi
          echo "[OK] $ICON_COUNT ic_launcher mipmap entries present"

          echo "=== APK size ==="
          ls -la pickando-demo.apk
          SIZE=$(stat -c %s pickando-demo.apk)
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::warning::APK size ($SIZE bytes) exceeds 10MB — may impact install rate on cellular"
          fi
          echo "[OK] APK size: $SIZE bytes"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pickando-android-apk
          path: pickando-demo.apk
          retention-days: 90

      - name: Upload signing debug info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pickando-android-signing-debug
          path: |
            certs.txt
            manifest.txt
            resources.txt
          retention-days: 7

  # ============================================================
  # Create GitHub Release with ALL artifacts attached
  # ============================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-web, build-android]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Linux
          if [ -d "artifacts/pickando-linux-x86_64" ]; then
            cp artifacts/pickando-linux-x86_64/pickando-backend-linux-x86_64 release-assets/ 2>/dev/null || true
          fi
          # Windows
          if [ -d "artifacts/pickando-windows-x86_64" ]; then
            cp artifacts/pickando-windows-x86_64/pickando-backend-windows-x86_64.exe release-assets/ 2>/dev/null || true
          fi
          # Web bundle (zip)
          if [ -d "artifacts/pickando-web" ]; then
            cd artifacts/pickando-web && zip -r ../../release-assets/pickando-web-wasm.zip . && cd ../..
          fi
          # Android APK — the most important artifact
          if [ -d "artifacts/pickando-android-apk" ]; then
            cp artifacts/pickando-android-apk/pickando-demo.apk release-assets/pickando-demo.apk
          fi
          ls -la release-assets/

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Pickando Demo ${{ steps.tag.outputs.name }}
          body: |
            # Pickando Demo — Same-Direction Local Mobility

            **Stack:** Rust 1.96 + Dioxus 0.7 + Axum 0.8

            ## 📱 Android APK

            **`pickando-demo.apk`** — App Android firmada con certificado de **release** (NO debug).
            Compatible con Android 7.0+ (API 24+).

            ### Cambios en esta versión
            - ✅ Firma con certificado de release (NO debug) — instala correctamente en Android 14+
            - ✅ `android:debuggable=false` explícito en manifest
            - ✅ Iconos PNG en todas las densidades (mdpi/hdpi/xhdpi/xxhdpi/xxxhdpi) + adaptativo (Android 8+)
            - ✅ Pantalla offline cuando no hay conexión
            - ✅ Manejo de errores de red en WebView
            - ✅ `versionCode` bump automático desde el tag

            ### Instalación
            1. Descarga `pickando-demo.apk`
            2. Transfiérelo a tu dispositivo Android (7.0+)
            3. Habilita "Instalar apps de origen desconocido" en Ajustes
            4. Ábrelo con el gestor de archivos → Instalar
            5. Si tienes una versión previa (v0.5.7 o anterior), **desinstálala primero**
               (cada release pre-v0.5.8 fue firmado con un certificado distinto).
               A partir de v0.5.8, todos los releases usan el mismo keystore persistente
               y se instalan como upgrade sin desinstalar. Ver docs/APK_SIGNING.md.

            La app carga la demo en vivo desde el deploy de Railway.

            ## 💻 Backend binaries

            - `pickando-backend-linux-x86_64` — Linux x86_64
            - `pickando-backend-windows-x86_64.exe` — Windows x86_64

            ## 🌐 Web (WASM)

            `pickando-web-wasm.zip` — Static WASM bundle. Descomprime y
            sírvelo con cualquier servidor HTTP estático.

            ## 🚀 Quick Start (Backend)

            ```bash
            # Linux
            chmod +x pickando-backend-linux-x86_64
            ./pickando-backend-linux-x86_64
            # → http://localhost:3000

            # Windows
            .\pickando-backend-windows-x86_64.exe
            ```

            ## 🔌 Endpoints

            | Method | Path | Description |
            |--------|------|-------------|
            | GET | /api/v1/health | Health check con uptime + rutas activas |
            | GET | /api/v1/routes | Listar rutas (sembradas + creadas) |
            | POST | /api/v1/routes | Crear nueva ruta |
            | POST | /api/v1/match | Buscar rutas compatibles |
            | GET | /ws | WebSocket bidireccional + live ticks |
          files: |
            release-assets/pickando-demo.apk
            release-assets/pickando-backend-linux-x86_64
            release-assets/pickando-backend-windows-x86_64.exe
            release-assets/pickando-web-wasm.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
