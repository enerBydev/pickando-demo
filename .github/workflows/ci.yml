name: CI — Pickando Demo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly security audit at 03:00 UTC
    - cron: "0 3 * * *"

# Least-privilege permissions for the default GITHUB_TOKEN.
# Security audit 8-a quick win #3 — without this, the token defaults to
# `contents: write` on push events to main, which is more than CI needs.
# (We only need `contents: read` for checkout + `actions: read` for
# downloading cached artifacts.)
permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  # =====================================================================
  # Job 1: Format check
  # =====================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  # =====================================================================
  # Job 2: Lint (clippy with -D warnings)
  # =====================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # =====================================================================
  # Job 3: Security audit (RustSec advisories)
  # =====================================================================
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-v1
      - name: Install cargo-audit (cached)
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked --no-default-features
          fi
      - name: Run cargo audit
        # cargo audit by default:
        #   - Exits non-zero if it finds real VULNERABILITIES (security issues)
        #   - Prints WARNINGS for unmaintained/unsound transitive deps
        #     (gtk-rs GTK3 via Dioxus, paste, proc-macro-error, rand 0.7)
        #     These are upstream issues we cannot fix without dropping Dioxus
        #     and are documented in CHANGELOG.md and SECURITY.md.
        # We do NOT pass --deny warnings (that would fail on the upstream
        # unmaintained crates). We DO want the build to fail on real
        # vulnerabilities, which is cargo audit's default behavior.
        # --no-yanked: don't fail on yanked crates (Dioxus has some)
        # --stale: allow using a cached advisory DB (CI cache friendly)
        run: cargo audit --no-yanked --stale

  # =====================================================================
  # Job 4: cargo-deny (licenses + bans + sources)
  # =====================================================================
  deny:
    name: Deny (licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

  # =====================================================================
  # Job 5: Tests (all crates)
  # =====================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Run tests
        run: cargo test --workspace --verbose
      - name: Run doc tests
        run: cargo test --workspace --doc

  # =====================================================================
  # Job 6: Build backend (release) + smoke test
  # =====================================================================
  build-backend:
    name: Build backend (Linux release)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-backend-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-backend-
      - name: Build backend (release)
        run: cargo build --release -p pickando-backend
      - name: Smoke-test backend binary
        run: |
          ./target/release/pickando-backend &
          SERVER_PID=$!
          sleep 2
          # Health check should return 200 with status=ok
          curl -sf http://localhost:3000/api/v1/health | jq -e '.status == "ok"'
          # Stats endpoint should return numeric fields
          curl -sf http://localhost:3000/api/v1/stats | jq -e '.routes_total > 0'
          # Routes should be a non-empty array
          curl -sf http://localhost:3000/api/v1/routes | jq -e 'length > 0'
          # Match endpoint should return matches
          curl -sf -X POST http://localhost:3000/api/v1/match \
            -H "Content-Type: application/json" \
            -d '{"lat": 19.4326, "lng": -99.1332, "radius_km": 5}' | jq -e 'length > 0'
          # Get single route by ID
          curl -sf http://localhost:3000/api/v1/routes/route-001 | jq -e '.id == "route-001"'
          # Request a ride
          curl -sf -X POST http://localhost:3000/api/v1/routes/route-001/request \
            -H "Content-Type: application/json" \
            -d '{"passenger_name":"Test","seats_requested":1}' | jq -e '.status == "pending"'
          # Cancel a route
          curl -sf -X DELETE http://localhost:3000/api/v1/routes/route-002 | jq -e '.type == "route_cancelled"'
          kill $SERVER_PID
      - uses: actions/upload-artifact@v4
        with:
          name: pickando-backend-linux
          path: target/release/pickando-backend

  # =====================================================================
  # Job 7: Build frontend (WASM) — parallel with backend
  # =====================================================================
  build-frontend-web:
    name: Build frontend (Web/WASM)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-
      - name: Cache dioxus-cli binary
        uses: actions/cache@v4
        id: dioxus-cache
        with:
          path: ~/.cargo/bin/dx
          key: dioxus-cli-0.7.9-${{ runner.os }}
      - name: Install dioxus-cli (cached)
        if: steps.dioxus-cache.outputs.cache-hit != 'true'
        run: cargo install dioxus-cli --version 0.7.9 --locked
      - name: Build frontend for web
        run: cd crates/frontend && dx build --platform web --release
      - name: Copy assets to build output
        run: |
          DIST_DIR="target/dx/pickando-frontend/release/web/public"
          mkdir -p "$DIST_DIR/assets"
          # Dioxus 0.7 does NOT copy these assets to the build output even
          # though index.html references them. We must copy all 8 manually
          # (kept in sync with Dockerfile lines 81-97 and release.yml).
          cp crates/frontend/assets/main.css "$DIST_DIR/assets/main.css"
          cp crates/frontend/assets/favicon.svg "$DIST_DIR/assets/favicon.svg"
          cp crates/frontend/assets/watchdog.js "$DIST_DIR/assets/watchdog.js"
          cp crates/frontend/assets/favicon-16.png "$DIST_DIR/assets/favicon-16.png"
          cp crates/frontend/assets/favicon-32.png "$DIST_DIR/assets/favicon-32.png"
          cp crates/frontend/assets/apple-touch-icon.png "$DIST_DIR/assets/apple-touch-icon.png"
          cp crates/frontend/assets/og-image.png "$DIST_DIR/assets/og-image.png"
          cp crates/frontend/assets/site.webmanifest "$DIST_DIR/assets/site.webmanifest"
      - name: Verify dist contains expected files
        run: |
          DIST_DIR="target/dx/pickando-frontend/release/web/public"
          # Verify all 8 assets + index.html + WASM bundle present.
          # Fail loudly if any is missing — this catches asset-copy drift
          # between the Dockerfile, release.yml, and ci.yml.
          test -f "$DIST_DIR/index.html"
          test -f "$DIST_DIR/assets/main.css"
          test -f "$DIST_DIR/assets/favicon.svg"
          test -f "$DIST_DIR/assets/watchdog.js"
          test -f "$DIST_DIR/assets/favicon-16.png"
          test -f "$DIST_DIR/assets/favicon-32.png"
          test -f "$DIST_DIR/assets/apple-touch-icon.png"
          test -f "$DIST_DIR/assets/og-image.png"
          test -f "$DIST_DIR/assets/site.webmanifest"
          test -n "$(find "$DIST_DIR" -name '*.wasm')"
          echo "WASM bundle + all 8 assets OK at $DIST_DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: pickando-frontend-web
          path: target/dx/pickando-frontend/release/web/public/

  # =====================================================================
  # Job 8: Benchmarks (no gate — informational)
  # =====================================================================
  bench:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-bench-
      - name: Run matching benchmarks
        run: cargo bench -p pickando-shared --bench matching -- --warm-up-time 1 --measurement-time 5
