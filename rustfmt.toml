# Rustfmt configuration — Pickando Demo
# Stable-channel options only. Nightly-only options (imports_granularity,
# group_imports, normalize_comments, etc.) are intentionally omitted so
# `cargo fmt` works on stable Rust 1.96+.
# https://rust-lang.github.io/rustfmt/

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
fn_call_width = 80
attr_fn_like_width = 70
struct_lit_width = 40
struct_variant_width = 35
array_width = 60
chain_width = 60
single_line_if_else_max_width = 50

reorder_imports = true
reorder_modules = true
use_field_init_shorthand = true
