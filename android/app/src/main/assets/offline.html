<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0A">
    <title>Nitheky — Sin conexión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #0A0A0A;
            color: #FAFAFA;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
        }
        .logo {
            width: 96px;
            height: 96px;
            border: 4px solid #C9A961;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            font-size: 48px;
            font-weight: 700;
            color: #C9A961;
            font-family: Georgia, serif;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #B8B8B8;
            max-width: 320px;
            margin-bottom: 8px;
        }
        .retry {
            margin-top: 32px;
            padding: 14px 32px;
            background: #C9A961;
            color: #0A0A0A;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .retry:active { opacity: 0.8; }
        .hint {
            margin-top: 24px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="logo">N</div>
    <h1>Sin conexión</h1>
    <p>Nitheky necesita internet para cargar la demo.</p>
    <p>Revisa tu conexión Wi-Fi o datos móviles.</p>
    <button class="retry" onclick="location.href='https://pickando-demo-production.up.railway.app/m/'">Reintentar</button>
    <p class="hint">pickando-demo-production.up.railway.app</p>
</body>
</html>
