# cargo-deny configuration — Pickando Demo
# Docs: https://embarkstudios.github.io/cargo-deny/

# ---------- Licenses ----------
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
exceptions = [
    # ring uses a non-standard but permissive license
    { name = "ring", allow = ["ISC", "OpenSSL"] },
]

[[licenses.clarify]]
name = "ring"
expression = "ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------- Security advisories ----------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # Add advisory IDs here if a fix is not yet available and the issue
    # has been triaged as non-blocking for this project.
]

# ---------- Banned crates ----------
[bans]
# Duplicates are warnings, not errors — the Rust ecosystem still has
# many transitive version splits (e.g. getrandom 0.3 + 0.4) that we
# cannot control. We flag them but don't fail the build.
multiple-versions = "warn"
# Wildcards (`dep = "1"` without patch) are also warnings — we pin
# our direct deps but transitive deps may use wildcards.
wildcards = "warn"
deny = []
skip = [
    # Allow specific duplicate versions until upstream aligns.
    # Each entry should have a comment explaining why.
]
skip-tree = []

# ---------- Sources ----------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
