version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pickando-db
    environment:
      POSTGRES_DB: pickando
      POSTGRES_USER: pickando
      POSTGRES_PASSWORD: pickando_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickando"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pickando-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
