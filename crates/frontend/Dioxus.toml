[application]
name = "Pickando"
default_platform = "web"

# Asset directory for static files
asset_dir = "assets"

[web.app]
title = "Pickando — Same-Direction Local Mobility"
base_path = "/"

# Use our custom index.html with diagnostic loading screen
index_html = "assets/index.html"

[web.watcher]
watch_path = ["src", "assets"]

[web.resource]
style = ["/assets/main.css"]

[bundle]
identifier = "com.pickando.demo"
publisher = "Pickando"
icon = ["assets/icon.png"]
