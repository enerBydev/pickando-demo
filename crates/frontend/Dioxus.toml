[application]
name = "Nitheky"
default_platform = "web"

# Asset directory for static files
asset_dir = "assets"

[web.app]
# Dioxus appends this string to whatever <title> is in index.html at build
# time. We leave it empty so the static <title> in index.html is the sole
# source of truth (better for SEO + crawlers that don't run JS).
title = ""
base_path = "/"

[web.watcher]
watch_path = ["src", "assets"]

[web.resource]
style = ["/assets/main.css"]

[web.resource.dev]

[bundle]
identifier = "com.nitheky.demo"
publisher = "Nitheky"
icon = ["assets/icon.png"]
