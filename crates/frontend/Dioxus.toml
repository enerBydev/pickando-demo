[application]
name = "Nitheky"
default_platform = "web"

# Asset directory for static files
asset_dir = "assets"

[web.app]
title = "Nitheky — Same-Direction Local Mobility"
base_path = "/"

[web.watcher]
watch_path = ["src", "assets"]

[web.resource]
style = ["/assets/main.css"]

[web.resource.dev]

[bundle]
identifier = "com.nitheky.demo"
publisher = "Nitheky"
icon = ["assets/icon.png"]
