<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pickando — Same-direction local mobility. Rust + Dioxus + Axum." />
    <meta name="theme-color" content="#0D0D11" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <title>{app_title}</title>
    <style>
        /* ===== LOADING SCREEN — auto-hidden once Dioxus mounts into #main ===== */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0D0D11;
            color: #E5E7EB;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 9999;
            background: radial-gradient(circle at 30% 30%, rgba(0,255,136,0.08), transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(37,99,235,0.08), transparent 50%),
                        #0D0D11;
        }
        .loading-logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .loading-logo-mark {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #00FF88 0%, #00C46A 100%);
            color: #0D0D11;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.8rem;
            box-shadow: 0 0 40px rgba(0,255,136,0.35);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0,255,136,0.3); transform: scale(1); }
            50% { box-shadow: 0 0 50px rgba(0,255,136,0.55); transform: scale(1.04); }
        }
        .loading-logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #FFFFFF;
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(0,255,136,0.18);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-status {
            font-size: 0.95rem;
            color: #9CA3AF;
            letter-spacing: 0.3px;
        }
        #loading-error {
            display: none;
            max-width: 540px;
            margin: 0 24px;
            padding: 20px 24px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.35);
            border-radius: 12px;
            color: #FCA5A5;
            font-size: 0.9rem;
            line-height: 1.55;
            text-align: left;
        }
        #loading-error h3 {
            margin: 0 0 8px;
            color: #FECACA;
            font-size: 1rem;
            font-weight: 700;
        }
        #loading-error code {
            display: block;
            margin-top: 10px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.35);
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #FCD34D;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .loading-retry {
            margin-top: 14px;
            padding: 8px 18px;
            background: #00FF88;
            color: #0D0D11;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .loading-retry:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0,255,136,0.35);
        }
        .loading-version {
            position: absolute;
            bottom: 18px;
            font-size: 0.75rem;
            color: #4B5563;
            letter-spacing: 0.4px;
        }
    </style>
</head>
<body>
    <!-- Loading screen — Dioxus mounts the app into #main, which our watchdog detects -->
    <div id="loading-screen">
        <div class="loading-logo">
            <div class="loading-logo-mark">P</div>
            <div class="loading-logo-text">Pickando</div>
        </div>
        <div class="loading-spinner"></div>
        <div class="loading-status" id="loading-status">Cargando Pickando...</div>
        <div id="loading-error" role="alert" aria-live="polite">
            <h3>No se pudo cargar la aplicación</h3>
            <div id="loading-error-msg"></div>
            <button class="loading-retry" onclick="location.reload()">Reintentar</button>
        </div>
        <div class="loading-version">v0.1.0 — Rust + Dioxus + Axum</div>
    </div>

    <!-- Dioxus mounts the app here -->
    <div id="main"></div>

    <script>
        // =====================================================================
        // Loading screen watchdog — robust against multiple failure modes
        // =====================================================================
        // The previous version only checked #main.children.length. That fails
        // if Dioxus 0.7 mounts the app differently (e.g. body, or with a
        // delayed mount). This version:
        //   1. Listens for wasm-bindgen's __dx_mainWasm global being set
        //   2. Polls #main AND body for any Dioxus-managed DOM nodes
        //   3. Listens for uncaught errors in the WASM init promise
        //   4. Surfaces a clear error if WASM truly fails to load
        // =====================================================================
        (function () {
            var status = document.getElementById('loading-status');
            var errorBox = document.getElementById('loading-error');
            var errorMsg = document.getElementById('loading-error-msg');
            var loadingScreen = document.getElementById('loading-screen');
            var main = document.getElementById('main');
            var hidden = false;
            var startTime = Date.now();
            var wasmLoadedAt = null;

            function showFatalError(reason, detail) {
                if (status) status.style.display = 'none';
                if (errorBox) errorBox.style.display = 'block';
                if (errorMsg) {
                    errorMsg.innerHTML = reason +
                        '<code>' + detail + '</code>' +
                        '<p style="margin-top:10px;color:#9CA3AF;font-size:0.85rem;">' +
                        'Posibles causas:<br>' +
                        '- El archivo WASM no se genero o no se sirvio correctamente.<br>' +
                        '- Hay un error de red o el backend no esta respondiendo.<br>' +
                        '- El navegador no soporta WebAssembly.<br>' +
                        'Revisa la consola del navegador (F12) para mas detalles.</p>';
                }
                console.error('[Pickando] Fatal load error:', reason, detail);
            }

            function hideLoadingScreen() {
                if (hidden || !loadingScreen || !loadingScreen.parentNode) return;
                hidden = true;
                loadingScreen.style.transition = 'opacity 0.35s ease';
                loadingScreen.style.opacity = '0';
                setTimeout(function () {
                    if (loadingScreen.parentNode) loadingScreen.parentNode.removeChild(loadingScreen);
                }, 400);
                console.log('[Pickando] App mounted, loading screen hidden after ' + (Date.now() - startTime) + 'ms');
            }

            // Detect WASM support early
            if (typeof WebAssembly === 'undefined') {
                showFatalError(
                    'Este navegador no soporta WebAssembly.',
                    'WebAssembly object is undefined.'
                );
                return;
            }

            // Listen for uncaught errors — most likely cause of stuck loading
            // is a WASM init failure that rejects silently.
            window.addEventListener('error', function (event) {
                // Only treat as fatal if it's clearly a WASM/resource error
                if (event.message && (
                    event.message.indexOf('CompileError') >= 0 ||
                    event.message.indexOf('LinkError') >= 0 ||
                    event.message.indexOf('wasm') >= 0 ||
                    event.message.indexOf('WASM') >= 0 ||
                    event.message.indexOf('Dioxus') >= 0 ||
                    event.message.indexOf('dioxus') >= 0
                )) {
                    showFatalError(
                        'Error durante la inicializacion de la app.',
                        String(event.message || 'Unknown error') + '\n' +
                        String(event.error && event.error.stack ? event.error.stack : '')
                    );
                }
            });

            window.addEventListener('unhandledrejection', function (event) {
                var reasonStr = '';
                try { reasonStr = String(event.reason && event.reason.message ? event.reason.message : event.reason); }
                catch (e) { reasonStr = 'unknown'; }
                if (reasonStr.indexOf('wasm') >= 0 || reasonStr.indexOf('WASM') >= 0 ||
                    reasonStr.indexOf('dioxus') >= 0 || reasonStr.indexOf('Dioxus') >= 0 ||
                    reasonStr.indexOf('fetch') >= 0) {
                    showFatalError('Error al cargar el WASM o inicializar Dioxus.', reasonStr);
                }
            });

            // Poll for app mount — check #main AND body for Dioxus content,
            // and also check for the __dx_mainWasm global being set (which
            // means the WASM has loaded and main() has been called).
            var pollInterval = setInterval(function () {
                if (hidden) {
                    clearInterval(pollInterval);
                    return;
                }
                // Sign 1: #main has children
                if (main && main.children && main.children.length > 0) {
                    clearInterval(pollInterval);
                    hideLoadingScreen();
                    return;
                }
                // Sign 2: WASM has loaded — set a marker but give Dioxus 2s
                // to mount before declaring it stuck
                if (window.__dx_mainWasm && !wasmLoadedAt) {
                    wasmLoadedAt = Date.now();
                }
                // Sign 3: WASM loaded 2s ago — Dioxus must have mounted by now
                // even if not into #main. Look for any [data-dioxus-id] attribute
                // anywhere in the body.
                if (wasmLoadedAt && (Date.now() - wasmLoadedAt) > 2000) {
                    var dioxusNodes = document.querySelectorAll('[data-dioxus-id]');
                    if (dioxusNodes.length > 0) {
                        clearInterval(pollInterval);
                        hideLoadingScreen();
                        return;
                    }
                }
            }, 100);

            // Safety net: if after 30s the loading screen is still visible,
            // surface a clear error so the user knows WHY the app didn't load
            // (instead of staying stuck on "Cargando Pickando...").
            setTimeout(function () {
                if (!hidden && loadingScreen && loadingScreen.parentNode) {
                    clearInterval(pollInterval);
                    var diag = 'Timeout after 30 seconds.\n' +
                        'Elapsed: ' + (Date.now() - startTime) + 'ms\n' +
                        '#main children: ' + (main ? main.children.length : 'no #main') + '\n' +
                        'WASM loaded: ' + (window.__dx_mainWasm ? 'yes' : 'no') + '\n' +
                        'Dioxus nodes in body: ' + document.querySelectorAll('[data-dioxus-id]').length + '\n' +
                        'The WASM file may be too large, the connection too slow, or main.js failed to load.\n' +
                        'Check the browser console (F12) for errors.';
                    showFatalError('La aplicacion tardo demasiado en iniciar.', diag);
                }
            }, 30000);
        })();
    </script>
</body>
</html>
