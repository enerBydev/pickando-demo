    <!--
        Static title for SEO + crawlers that don't execute JS.
        Dioxus sets document.title at runtime from [web.app] title in Dioxus.toml.
        Keep both in sync to avoid showing a stale or duplicated title.
    -->
    <title>Nitheky — Same-Direction Local Mobility</title>

    <!--
        ============================================================
        CRITICAL: Loading-screen CSS is SCOPED to body.is-loading.
        The previous version had `html, body { overflow: hidden;
        height: 100%; }` at the global scope, which broke scrolling
        for the entire app. Now html/body allow natural document
        flow; only the loading overlay uses position: fixed.
        ============================================================
    -->
    <style>
        /* ===== Base reset — NEVER apply overflow:hidden or height:100% here ===== */
        html, body {
            margin: 0;
            padding: 0;
            background: #FAFAFA;
            color: #0A0A0A;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            /* CRITICAL: do NOT set overflow:hidden or height:100% here.
               The document must scroll naturally to its full content height. */
        }

        /* ===== Loading screen — fully scoped, does NOT leak to html/body ===== */
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 9999;
            background:
                radial-gradient(ellipse at top, rgba(201, 169, 97, 0.10), transparent 60%),
                radial-gradient(ellipse at bottom, rgba(10, 10, 10, 0.04), transparent 50%),
                #FAFAFA;
            /* This element alone has its own overflow; html/body remain scrollable */
        }
        .loading-logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .loading-logo-mark {
            width: 56px;
            height: 56px;
            background: #0A0A0A;
            color: #C9A961;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.8rem;
            box-shadow: 0 8px 24px rgba(10, 10, 10, 0.12);
            animation: pulse 2.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(10, 10, 10, 0.12); transform: scale(1); }
            50% { box-shadow: 0 12px 32px rgba(201, 169, 97, 0.30); transform: scale(1.04); }
        }
        .loading-logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #0A0A0A;
        }
        .loading-logo-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #C9A961;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
        }
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(10, 10, 10, 0.10);
            border-top-color: #0A0A0A;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-status {
            font-size: 0.9rem;
            color: #6E6E6E;
            letter-spacing: 0.3px;
            text-align: center;
            max-width: 400px;
            font-weight: 500;
        }
        .loading-tagline {
            font-size: 0.8rem;
            color: #8A8278;
            margin-top: -8px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }
        #loading-error {
            display: none;
            max-width: 540px;
            margin: 0 24px;
            padding: 20px 24px;
            background: rgba(181, 35, 46, 0.04);
            border: 1px solid rgba(181, 35, 46, 0.25);
            border-radius: 12px;
            color: #B5232E;
            font-size: 0.9rem;
            line-height: 1.55;
            text-align: left;
        }
        #loading-error h3 {
            margin: 0 0 8px;
            color: #8C1A22;
            font-size: 1rem;
            font-weight: 700;
        }
        #loading-error code {
            display: block;
            margin-top: 10px;
            padding: 10px 12px;
            background: rgba(10, 10, 10, 0.04);
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.78rem;
            color: #3A3A3A;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .loading-retry {
            margin-top: 14px;
            padding: 8px 18px;
            background: #0A0A0A;
            color: #FAFAFA;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }
        .loading-retry:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(10, 10, 10, 0.18);
        }
        .loading-version {
            position: absolute;
            bottom: 18px;
            font-size: 0.7rem;
            color: #8A8278;
            letter-spacing: 0.4px;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
    <link rel="stylesheet" href="/assets/main.css">
    <!-- Dioxus CLI inserts the WASM bundle <script> tag here during `dx build` -->
    <!-- Do NOT hardcode script tags here — Dioxus manages them automatically -->
</head>
<body>
    <!-- Loading screen — Dioxus mounts the app into #main, which our watchdog detects.
         This element is REMOVED from the DOM once the app mounts, so it cannot
         affect document scrolling afterwards. -->
    <div id="loading-screen">
        <div class="loading-logo">
            <div class="loading-logo-mark">N</div>
            <div class="loading-logo-text">Nitheky<span class="loading-logo-dot"></span></div>
        </div>
        <div class="loading-spinner"></div>
        <div class="loading-status" id="loading-status">Cargando Nitheky…</div>
        <div class="loading-tagline">MOVILIDAD COMPARTIDA EN TU MISMA DIRECCIÓN</div>
        <div id="loading-error" role="alert" aria-live="polite">
            <h3>No se pudo cargar la aplicación</h3>
            <div id="loading-error-msg"></div>
            <button class="loading-retry" onclick="location.reload()">Reintentar</button>
        </div>
        <div class="loading-version">v0.5.8 · RUST + DIOXUS + AXUM</div>
    </div>

    <!-- Dioxus mounts the app here -->
    <div id="main"></div>

    <!-- Loading-screen watchdog (external file — CSP-friendly: works under script-src self) -->
    <script src="/assets/watchdog.js"></script>
</body>
</html>
